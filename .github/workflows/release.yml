name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run build check
        run: npm run build

      - name: Build release archive
        run: npm run package:release

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          release_payload="$(printf '{"tag_name":"%s","name":"%s","generate_release_notes":true}' "$tag" "$tag")"

          existing_release="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "${api}/tags/${tag}" || true)"

          if [ -n "${existing_release}" ]; then
            release_json="${existing_release}"
          else
            release_json="$(curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "${api}" \
              -d "${release_payload}")"
          fi

          release_id="$(printf '%s' "${release_json}" | node -p "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); data.id ?? ''")"
          upload_url="$(printf '%s' "${release_json}" | node -p "const data = JSON.parse(require('fs').readFileSync(0, 'utf8')); (data.upload_url || '').replace(/\{.*$/, '')")"

          if [ -z "${upload_url}" ] || [ -z "${release_id}" ]; then
            echo "Failed to resolve GitHub release metadata." >&2
            exit 1
          fi

          assets_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "${api}/${release_id}/assets")"

          asset_id="$(printf '%s' "${assets_json}" | node -p "const assets = JSON.parse(require('fs').readFileSync(0, 'utf8')); const asset = assets.find(item => item.name === 'kiel-univis-courses.zip'); asset ? asset.id : ''")"

          if [ -n "${asset_id}" ]; then
            curl -fsSL \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "${api}/assets/${asset_id}"
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @release/kiel-univis-courses.zip \
            "${upload_url}?name=kiel-univis-courses.zip"
